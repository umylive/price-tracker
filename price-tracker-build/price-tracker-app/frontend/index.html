<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Price Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263348;
      --border: #334155;
      --accent: #3b82f6;
      --accent-h: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --amazon: #ff9900;
      --prime: #00a8e1;
      --card-r: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; min-height: 100dvh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 18px; font-weight: 700; flex: 1; display: flex; align-items: center; gap: 8px; }
    header h1 span { font-size: 20px; }
    main { flex: 1; padding: 16px; max-width: 1200px; margin: 0 auto; width: 100%; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger)33; }
    .btn-danger:hover:not(:disabled) { background: var(--danger)22; }
    .btn-sm { padding: 5px 10px; font-size: 13px; }
    .btn-icon { padding: 8px; border-radius: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    /* ── Cards ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); overflow: hidden; display: flex; flex-direction: column; transition: border-color .2s; }
    .card:hover { border-color: var(--accent)66; }
    .card.inactive { opacity: .6; }

    .card-top { display: flex; gap: 12px; padding: 14px 14px 0; }
    .card-img { width: 80px; height: 80px; border-radius: 8px; object-fit: contain; background: var(--surface2); flex-shrink: 0; }
    .card-img-placeholder { width: 80px; height: 80px; border-radius: 8px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .card-meta { flex: 1; min-width: 0; }
    .card-store { font-size: 11px; font-weight: 600; color: var(--amazon); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
    .card-name { font-weight: 600; font-size: 14px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    .card-price-row { padding: 12px 14px 0; display: flex; align-items: baseline; gap: 10px; }
    .card-price { font-size: 26px; font-weight: 700; color: var(--text); }
    .card-currency { font-size: 14px; color: var(--muted); margin-right: 2px; }
    .card-change { font-size: 13px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
    .card-change.down { background: var(--success)22; color: var(--success); }
    .card-change.up { background: var(--danger)22; color: var(--danger); }
    .card-change.flat { background: var(--muted)22; color: var(--muted); }
    .card-was { font-size: 12px; color: var(--muted); text-decoration: line-through; }

    .card-badges { padding: 8px 14px 0; display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
    .badge-amazon { background: var(--amazon)22; color: var(--amazon); }
    .badge-third { background: var(--muted)22; color: var(--muted); }
    .badge-prime { background: var(--prime)22; color: var(--prime); }
    .badge-instock { background: var(--success)22; color: var(--success); }
    .badge-outstock { background: var(--danger)22; color: var(--danger); }
    .badge-error { background: var(--danger)22; color: var(--danger); }
    .badge-inactive { background: var(--muted)22; color: var(--muted); }

    .card-stats { padding: 10px 14px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat-item { }
    .stat-label { font-size: 11px; color: var(--muted); }
    .stat-val { font-size: 13px; font-weight: 600; }
    .stat-val.low { color: var(--success); }
    .stat-val.high { color: var(--danger); }

    .card-checked { padding: 6px 14px 0; font-size: 11px; color: var(--muted); }

    .card-actions { padding: 12px 14px 14px; display: flex; gap: 6px; margin-top: auto; flex-wrap: wrap; }
    .card-actions .btn { flex: 1; justify-content: center; }

    /* ── Error state ── */
    .card-error { padding: 8px 14px; font-size: 12px; color: var(--danger); background: var(--danger)11; border-top: 1px solid var(--danger)33; margin-top: 10px; border-radius: 0 0 4px 4px; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 64px 24px; color: var(--muted); }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty h2 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty p { margin-bottom: 24px; }

    /* ── Sheet / Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: none; }
    .overlay.open { display: block; }
    .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; z-index: 201; max-height: 92dvh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,0,.67,0); }
    .sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 4px; flex-shrink: 0; }
    .sheet-header { display: flex; align-items: center; padding: 8px 16px 12px; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sheet-title { font-size: 17px; font-weight: 700; flex: 1; }
    .sheet-body { overflow-y: auto; padding: 16px; flex: 1; }
    .sheet-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-toggle { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
    .form-toggle input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    .form-toggle span { font-size: 14px; }

    /* ── Auth ── */
    .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 24px; }
    .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 400px; }
    .auth-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
    .auth-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .auth-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 24px; }

    /* ── Loading / Error ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 32px; color: var(--muted); gap: 10px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .alert-error { background: var(--danger)22; color: var(--danger); border: 1px solid var(--danger)33; }
    .alert-success { background: var(--success)22; color: var(--success); border: 1px solid var(--success)33; }
    .alert-info { background: var(--accent)22; color: var(--accent); border: 1px solid var(--accent)33; }

    /* ── Chart ── */
    .chart-wrap { position: relative; height: 260px; margin: 16px 0; }
    .chart-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .chart-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ── History table ── */
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th { padding: 8px 10px; text-align: left; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .history-table td { padding: 8px 10px; border-bottom: 1px solid var(--border)55; vertical-align: middle; }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr.error-row td { color: var(--danger); font-size: 12px; }
    .seller-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .seller-dot.amazon { background: var(--amazon); }
    .seller-dot.third { background: var(--muted); }

    /* ── Notifications ── */
    .notif-list { display: flex; flex-direction: column; gap: 10px; }
    .notif-item { background: var(--surface2); border-radius: 10px; padding: 12px 14px; border-left: 3px solid var(--accent); }
    .notif-item.price_drop { border-left-color: var(--success); }
    .notif-item.back_in_stock { border-left-color: var(--prime); }
    .notif-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: flex; gap: 8px; }
    .notif-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .notif-price { font-size: 13px; color: var(--text); }

    /* ── Settings ── */
    .settings-section { margin-bottom: 24px; }
    .settings-section h3 { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .masked-val { font-family: monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

    /* ── Stats Bar ── */
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; transition: transform .15s, box-shadow .15s; }
    .stat-tile:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
    .stat-tile-icon { font-size: 20px; margin-bottom: 4px; line-height: 1; }
    .stat-tile-value { font-weight: 700; line-height: 1.1; }
    .stat-tile-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; }
    .stat-tile-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── View tabs ── */
    .view-tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: 8px; padding: 3px; flex-shrink: 0; }
    .view-tab { padding: 5px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: background .15s, color .15s; white-space: nowrap; }
    .view-tab.active { background: var(--accent); color: #fff; }
    .view-tab:hover:not(.active) { background: var(--border); color: var(--text); }

    /* ── Card highlights ── */
    .card.highlight-low { border-color: var(--prime); box-shadow: 0 0 0 1px var(--prime)33; }
    .card.highlight-sale { border-color: var(--amazon); box-shadow: 0 0 0 1px var(--amazon)33; }
    .card.highlight-drop { border-color: var(--success); box-shadow: 0 0 0 1px var(--success)33; }

    /* ── Group headers ── */
    .group-header { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .group-count { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 1px 8px; font-size: 12px; font-weight: 600; }

    /* ── Purchases ── */
    .purchases-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .purchase-stat { background: var(--surface2); border-radius: 10px; padding: 12px 14px; text-align: center; }
    .purchase-stat-val { font-size: 20px; font-weight: 700; }
    .purchase-stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
    .purchases-list { display: flex; flex-direction: column; gap: 12px; }
    .purchase-item { background: var(--surface2); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
    .purchase-item-top { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .purchase-img { width: 52px; height: 52px; border-radius: 8px; object-fit: contain; background: var(--surface); flex-shrink: 0; }
    .purchase-img-ph { width: 52px; height: 52px; border-radius: 8px; background: var(--surface); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .purchase-item-meta { flex: 1; min-width: 0; }
    .purchase-item-name { font-weight: 600; font-size: 13px; line-height: 1.3; margin-bottom: 4px; }
    .purchase-item-date { font-size: 12px; color: var(--muted); }
    .purchase-item-notes { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; }
    .purchase-item-prices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); }
    .purchase-price-col span { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }

    /* ── Wishlist ── */
    .wishlist-total-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .wishlist-total-val { font-size: 28px; font-weight: 700; color: var(--accent); }
    .wishlist-total-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
    .wishlist-list { display: flex; flex-direction: column; gap: 12px; }
    .wishlist-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
    .wishlist-card-img { width: 60px; height: 60px; border-radius: 8px; object-fit: contain; background: var(--surface2); flex-shrink: 0; }
    .wishlist-card-img-ph { width: 60px; height: 60px; border-radius: 8px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .wishlist-card-info { flex: 1; min-width: 0; }
    .wishlist-card-name { font-weight: 600; font-size: 14px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .wishlist-card-price { font-size: 18px; font-weight: 700; }
    .wishlist-card-store { font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .wishlist-qty-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .wishlist-qty-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .wishlist-qty-btn:hover { background: var(--border); }
    .wishlist-qty-val { font-size: 15px; font-weight: 700; min-width: 24px; text-align: center; }
    .wishlist-card-subtotal { font-size: 15px; font-weight: 700; color: var(--accent); min-width: 90px; text-align: right; flex-shrink: 0; }

    /* ── IKEA badge ── */
    .badge-ikea { background: #0058A322; color: #0058A3; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .card-stats { grid-template-columns: 1fr 1fr; }
      main { padding: 12px; }
      header { padding: 0 10px; gap: 6px; flex-wrap: nowrap; overflow-x: auto; }
      header h1 { font-size: 15px; flex-shrink: 0; }
      header h1 span { display: none; }
      .view-tabs { gap: 1px; }
      .view-tab { padding: 4px 8px; font-size: 12px; white-space: nowrap; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-tile { padding: 10px 12px; }
      .stat-tile-value { font-size: 22px !important; }
      .wishlist-card { flex-wrap: wrap; gap: 10px; }
      .wishlist-card-subtotal { min-width: unset; }
      .purchases-summary { grid-template-columns: repeat(2, 1fr); }
      .sort-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
      .sort-scroll > div { min-width: max-content; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title"></div>
    <button class="btn-icon" data-action="close-sheet">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-footer" id="sheet-footer"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const state = {
  user: null,
  items: [],
  checking: new Set(),
  sheetChart: null,
  sort: 'date_desc',
  groupBy: 'none',
  view: 'main',
  purchasedItems: null,
  wishlistItems: null,
};

const USD_TO_SAR = 3.75;

// ── API ────────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function relativeTime(iso) {
  if (!iso) return 'Never';
  // SQLite datetime('now') returns UTC without 'Z'; add it so JS parses as UTC not local time
  const ts = iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function fmtPrice(n) {
  if (n == null) return '—';
  return n.toLocaleString('en-SA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function priceDiff(current, prev) {
  if (current == null || prev == null || prev === 0) return null;
  return ((current - prev) / prev) * 100;
}

function fmtDate(s) {
  if (!s) return '—';
  const datePart = s.substring(0, 10);
  const parts = datePart.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
}

function detectCategory(name) {
  if (!name) return 'Other';
  const n = name.toLowerCase();
  if (/iphone|samsung.*(galaxy|s\d|a\d|note)|xiaomi|oppo|realme|vivo|oneplus|pixel|nokia|redmi|poco|smartphone|mobile phone|cell phone/.test(n)) return 'Mobile Phones';
  if (/ipad|galaxy tab|surface.*pro|lenovo.*tab|kindle.*fire|tablet/.test(n)) return 'Tablets';
  if (/laptop|notebook|macbook|thinkpad|chromebook|gaming laptop|ultrabook/.test(n)) return 'Laptops & PCs';
  if (/apple watch|galaxy watch|garmin|fitbit|smartwatch|smart watch|fitness band|sport band/.test(n)) return 'Wearables';
  if (/headphone|earphone|earbuds|airpod|tws|speaker|soundbar|sound bar|subwoofer|audio/.test(n)) return 'Audio';
  if (/\btv\b|television|qled|oled|smart tv|\d+.inch.*tv|monitor|gaming monitor|curved.*screen/.test(n)) return 'TVs & Monitors';
  if (/gaming chair|office chair|ergonomic chair|\bchair\b|bar stool|accent chair|recliner/.test(n)) return 'Chairs & Seating';
  if (/\bsofa\b|couch|sectional|bed frame|wardrobe|dresser|cabinet|bookshelf|\bshelf\b|coffee table|dining table|side table|\bdesk\b|furniture/.test(n)) return 'Furniture';
  if (/\bcamera\b|dslr|mirrorless|gopro|action cam|ring light|tripod|lens/.test(n)) return 'Cameras';
  if (/vacuum|washing machine|dishwasher|refrigerator|\bfridge\b|microwave|air condition|\bac \b|water heater|dryer/.test(n)) return 'Home Appliances';
  if (/\boven\b|air fryer|blender|coffee maker|kettle|toaster|cookware|\bpot\b|\bpan\b|kitchen knife/.test(n)) return 'Kitchen';
  if (/playstation|xbox|nintendo|gaming|game controller|ps[45]|console/.test(n)) return 'Gaming';
  if (/printer|ink cartridge|scanner|projector|router|modem|hard drive|ssd|\bram\b|keyboard|mouse.*wireless|usb hub/.test(n)) return 'Tech Accessories';
  if (/perfume|cologne|skincare|moisturizer|serum|makeup|lipstick|foundation|fragrance/.test(n)) return 'Beauty';
  if (/protein powder|supplement|vitamin|creatine|gym|dumbbell|treadmill|yoga mat/.test(n)) return 'Health & Fitness';
  if (/\bcar \b|auto |vehicle|tire|car charger|car seat|dashboard cam/.test(n)) return 'Automotive';
  if (/book|novel|textbook|journal/.test(n)) return 'Books';
  return 'Other';
}

function getDateGroup(iso) {
  if (!iso) return 'Unknown';
  const ts = iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z';
  const diffDays = (Date.now() - new Date(ts).getTime()) / 86400000;
  if (diffDays < 1) return 'Today';
  if (diffDays < 7) return 'This Week';
  if (diffDays < 30) return 'This Month';
  return 'Earlier';
}

// ── Render: Stats Bar ─────────────────────────────────────────────────────────
function renderStatsBar() {
  const items = state.items;
  if (items.length === 0) return '';

  const total = items.length;
  const activeCount = items.filter(i => i.active).length;
  const pausedCount = total - activeCount;
  const inStockCount = items.filter(i => i.latest && !i.latest.error && i.latest.in_stock).length;
  const outOfStockCount = items.filter(i => i.latest && !i.latest.error && !i.latest.in_stock).length;
  const onSaleCount = items.filter(i => {
    const p = i.latest;
    return p && !p.error && p.original_price && p.price && p.original_price > p.price;
  }).length;
  const dropCount = items.filter(i => {
    const c = i.latest ? i.latest.price : null;
    const h = i.highestPrice;
    return c != null && h != null && h > 0 && (h - c) / h >= 0.05;
  }).length;
  const newLowCount = items.filter(i => {
    return i.latest && i.latest.price != null && i.lowestPrice != null &&
      i.latest.price <= i.lowestPrice && i.prevPrice != null && i.prevPrice > i.lowestPrice;
  }).length;
  const withTargetCount = items.filter(i => i.target_price).length;
  const atTargetCount = items.filter(i =>
    i.target_price && i.latest && i.latest.price != null && i.latest.price <= i.target_price
  ).length;
  const totalValue = items.reduce(function(sum, i) { return sum + (i.latest && i.latest.price ? i.latest.price : 0); }, 0);

  const tiles = [
    {
      icon: '📦',
      value: String(total),
      fs: '28px',
      label: 'Items Tracked',
      sub: activeCount + ' active' + (pausedCount > 0 ? ' · ' + pausedCount + ' paused' : ''),
      color: 'var(--accent)',
    },
    {
      icon: '✅',
      value: String(inStockCount),
      fs: '28px',
      label: 'In Stock',
      sub: outOfStockCount + ' out of stock',
      color: 'var(--success)',
    },
    {
      icon: '🏷️',
      value: String(onSaleCount),
      fs: '28px',
      label: 'On Sale',
      sub: 'Amazon price reduced',
      color: 'var(--amazon)',
    },
    {
      icon: '📉',
      value: String(dropCount),
      fs: '28px',
      label: 'Price Drops',
      sub: '5%+ below their peak',
      color: 'var(--success)',
    },
    {
      icon: '⭐',
      value: String(newLowCount),
      fs: '28px',
      label: 'New All-Time Low',
      sub: 'just hit lowest ever',
      color: 'var(--prime)',
    },
    {
      icon: '🎯',
      value: String(atTargetCount),
      fs: '28px',
      label: 'At Target',
      sub: 'of ' + withTargetCount + ' with target',
      color: 'var(--warning)',
    },
    {
      icon: '💰',
      value: 'SAR ' + fmtPrice(totalValue),
      fs: '18px',
      label: 'Portfolio Value',
      sub: 'sum of current prices',
      color: 'var(--accent)',
    },
  ];

  return '<div class="stats-bar">' +
    tiles.map(function(t) {
      return '<div class="stat-tile" style="border-top:3px solid ' + t.color + '">' +
        '<div class="stat-tile-icon">' + t.icon + '</div>' +
        '<div class="stat-tile-value" style="font-size:' + t.fs + ';color:' + t.color + '">' + t.value + '</div>' +
        '<div class="stat-tile-label">' + t.label + '</div>' +
        '<div class="stat-tile-sub">' + t.sub + '</div>' +
        '</div>';
    }).join('') +
    '</div>';
}

    ${opts.map(([v, l]) => `<button class="btn btn-sm ${state.groupBy===v?'btn-primary':'btn-ghost'}" data-action="group" data-group="${v}" style="white-space:nowrap">${l}</button>`).join('')}
  </div></div>`;

function renderGroupedItems(sorted) {
  if (state.groupBy === 'none') {
    return '<div class="grid">' + sorted.map(renderCard).join('') + '</div>';
  }
  const groups = new Map();
  const order = [];
  sorted.forEach(function(item) {
    var key;
    if (state.groupBy === 'category') {
      key = detectCategory(item.name);
    } else if (state.groupBy === 'status') {
      if (!item.active) key = 'Paused';
      else if (!item.latest) key = 'Not Checked Yet';
      else if (item.latest.error) key = 'Error';
      else if (item.latest.in_stock) key = 'In Stock';
      else key = 'Out of Stock';
    } else if (state.groupBy === 'sale') {
      var p = item.latest;
      key = (p && !p.error && p.original_price && p.price && p.original_price > p.price) ? 'On Sale' : 'Full Price';
    }
    if (!groups.has(key)) { groups.set(key, []); order.push(key); }
    groups.get(key).push(item);
  });
  return order.map(function(key) {
    var groupItems = groups.get(key);
    return '<div style="margin-bottom:28px">' +
      '<div class="group-header">' + key + ' <span class="group-count">' + groupItems.length + '</span></div>' +
      '<div class="grid">' + groupItems.map(renderCard).join('') + '</div>' +
      '</div>';
  }).join('');
}

          <button class="view-tab ${state.view === 'wishlist' ? 'active' : ''}" data-action="switch-view" data-view="wishlist">🛒 Wishlist${state.wishlistItems && state.wishlistItems.length ? ' (' + state.wishlistItems.length + ')' : ''}</button>
          <button class="view-tab ${state.view === 'purchased' ? 'active' : ''}" data-action="switch-view" data-view="purchased">🛍️ Purchased</button>
        </div>
        <button class="btn btn-ghost btn-sm" data-action="open-notifications" title="Notifications">🔔</button>
        <button class="btn btn-ghost btn-sm" data-action="open-settings" title="Settings">⚙️</button>
        ${state.view === 'main' ? '<button class="btn btn-primary btn-sm" data-action="open-add-item">+ Add Item</button>' : ''}
        ${state.view === 'wishlist' ? '<button class="btn btn-primary btn-sm" data-action="open-add-wishlist">+ Add to Wishlist</button>' : ''}
        <button class="btn-icon" data-action="logout" title="Logout" style="color:var(--muted);font-size:16px">⏏</button>
      </header>
      <main>
        ${state.view === 'purchased'
          ? (state.purchasedItems === null ? '<div class="loading"><div class="spinner"></div> Loading...</div>' : renderPurchasedView())
          : state.view === 'wishlist'
          ? (state.wishlistItems === null ? '<div class="loading"><div class="spinner"></div> Loading...</div>' : renderWishlistView())
          : (items.length === 0 ? renderEmpty() : `${renderStatsBar()}${renderSortBar()}${renderGroupBar()}${renderGroupedItems(sorted)}`)
        }
      </main>
    </div>`;
}

function storeLabel(item) {
  if (item.store === 'ikea_sa') return 'IKEA SA';
  return 'Amazon SA';
}

function storeColor(item) {
  if (item.store === 'ikea_sa') return '#0058A3';
  return 'var(--amazon)';
}

function itemCurrency(item) {
  return item.latest?.currency || 'SAR';
}

function sortItems(items) {
  const arr = [...items];
  switch (state.sort) {
    case 'date_asc':    return arr.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    case 'date_desc':   return arr.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    case 'price_asc':   return arr.sort((a, b) => (a.latest?.price ?? Infinity) - (b.latest?.price ?? Infinity));
    case 'price_desc':  return arr.sort((a, b) => (b.latest?.price ?? -Infinity) - (a.latest?.price ?? -Infinity));
    case 'store':       return arr.sort((a, b) => storeLabel(a).localeCompare(storeLabel(b)));
    case 'discount': {
      const disc = i => { const p = i.latest?.price, o = i.latest?.original_price; return (p && o && o > p) ? (o - p) / o : 0; };
      return arr.sort((a, b) => disc(b) - disc(a));
    }
    case 'price_drop': {
      const drop = i => { const c = i.latest?.price, p = i.prevPrice; return (c && p && p > c) ? (p - c) / p : 0; };
      return arr.sort((a, b) => drop(b) - drop(a));
    }
    default: return arr;
  }
}

function renderSortBar() {
  const opts = [
    ['date_desc','Newest'],['date_asc','Oldest'],
    ['price_asc','Price ↑'],['price_desc','Price ↓'],
    ['store','Store'],['discount','Discount'],['price_drop','Drop'],
  ];
  return `<div class="sort-scroll" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap">
    <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0">Sort:</span>
    ${opts.map(([v, l]) => `<button class="btn btn-sm ${state.sort===v?'btn-primary':'btn-ghost'}" data-action="sort" data-sort="${v}" style="white-space:nowrap">${l}</button>`).join('')}
  </div></div>`;
}

function renderEmpty() {
  return `<div class="empty">
    <div class="empty-icon">📦</div>
    <h2>No items yet</h2>
    <p>Add products from Amazon SA or IKEA SA to start tracking their prices.</p>
    <button class="btn btn-primary" data-action="open-add-item">+ Add Your First Item</button>
  </div>`;
}

function renderCard(item) {
  const p = item.latest;
  const currentPrice = p?.price ?? null;
  const cur = itemCurrency(item);
  const diffFromPrev = priceDiff(currentPrice, item.prevPrice);
  const diffFromPeak = priceDiff(currentPrice, item.highestPrice);
  const inStock = p?.in_stock ?? true;
  const hasError = p?.error;

  const discountFromList = p && !p.error && p.original_price && currentPrice && p.original_price > currentPrice
    ? Math.round((p.original_price - currentPrice) / p.original_price * 100)
    : null;

  let changeHtml = '';
  if (discountFromList != null) {
    changeHtml = '<span class="card-change down">-' + discountFromList + '% off</span>';
  } else if (diffFromPeak != null && diffFromPeak < -0.1) {
    changeHtml = '<span class="card-change down">&#x2193; ' + Math.abs(diffFromPeak).toFixed(1) + '% from peak</span>';
  }

  const sellerBadge = p && !p.error
    ? (p.is_amazon_direct
        ? `<span class="badge badge-amazon">&#x2705; ${escHtml(p.seller_name || 'Amazon SA')}</span>`
        : (p.seller_name ? `<span class="badge badge-third">&#x1F3EA; ${escHtml(p.seller_name)}</span>` : ''))
    : '';

  const stockBadge = hasError
    ? `<span class="badge badge-error">⚠ Check failed</span>`
    : (inStock
        ? `<span class="badge badge-instock">● In Stock</span>`
        : `<span class="badge badge-outstock">● Out of Stock</span>`);

  const primeBadge = p?.is_prime ? `<span class="badge badge-prime">⚡ Prime</span>` : '';
  const inactiveBadge = !item.active ? `<span class="badge badge-inactive">Paused</span>` : '';
  const targetBadge = item.target_price && currentPrice && currentPrice <= item.target_price
    ? `<span class="badge badge-instock">🎯 At Target</span>` : '';

  const imageHtml = item.image_url
    ? `<img class="card-img" src="${escHtml(item.image_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholderStyle = item.image_url ? 'display:none' : '';

  const hasOtherSellers = !inStock && p && p.has_other_sellers;
  const otherSellersPrice = p ? p.other_sellers_price : null;
  // override stockBadge to handle other sellers case
  const stockBadgeFinal = hasError ? stockBadge
    : (inStock ? stockBadge
        : (hasOtherSellers
            ? '<span class="badge badge-third">&#x1F3EA; Other sellers available</span>'
            : stockBadge));

  // Card highlight logic
  const isNewLow = currentPrice != null && item.lowestPrice != null &&
    currentPrice <= item.lowestPrice && item.prevPrice != null && item.prevPrice > item.lowestPrice;
  const isOnSaleHistory = item.highestPrice && currentPrice != null &&
    item.highestPrice > 0 && (item.highestPrice - currentPrice) / item.highestPrice >= 0.05;
  const isOnSaleNow = p && !p.error && p.original_price && currentPrice && p.original_price > currentPrice;
  const highlightClass = isNewLow ? ' highlight-low' : (isOnSaleNow ? ' highlight-sale' : (isOnSaleHistory ? ' highlight-drop' : ''));
  const highlightBadge = isNewLow
    ? '<span class="badge" style="background:var(--prime)22;color:var(--prime)">New Low</span>'
    : (isOnSaleHistory && !isOnSaleNow
        ? '<span class="badge" style="background:var(--success)22;color:var(--success)">-' + Math.round((item.highestPrice - currentPrice) / item.highestPrice * 100) + '% from peak</span>'
        : '');

  const isChecking = state.checking.has(item.id);

  return `<div class="card${item.active ? '' : ' inactive'}${highlightClass}" data-id="${item.id}">
    <div class="card-top">
      ${imageHtml}
      <div class="card-img-placeholder" style="${placeholderStyle}">📦</div>
      <div class="card-meta">
        <div class="card-store" style="color:${storeColor(item)}">${storeLabel(item)}</div>
        <div class="card-name">${escHtml(item.name)}</div>
      </div>
    </div>

    <div class="card-price-row">
      ${currentPrice != null
        ? `<div class="card-price"><span class="card-currency">${cur}</span>${fmtPrice(currentPrice)}</div>
           ${changeHtml}
           ${discountFromList == null && item.prevPrice && diffFromPrev !== null && item.prevPrice !== currentPrice
             ? `<span class="card-was">${cur} ${fmtPrice(item.prevPrice)}</span>` : ''}`
        : `<div style="color:var(--muted);font-size:14px">${hasError ? 'Check failed' : 'Not yet checked'}</div>`
      }
    </div>
    ${discountFromList != null
      ? `<div style="font-size:12px;color:var(--muted);padding:2px 14px 0">List: <span style="text-decoration:line-through">${cur} ${fmtPrice(p.original_price)}</span></div>`
      : ''
    }
    ${cur === 'USD' && currentPrice != null
      ? `<div style="font-size:12px;color:var(--muted);padding:2px 14px 0">&#x2248; SAR ${fmtPrice(currentPrice * USD_TO_SAR)}</div>`
      : ''
    }

    ${hasOtherSellers && otherSellersPrice != null
      ? `<div style="font-size:12px;color:var(--muted);padding:2px 14px 0">Other sellers from <strong style="color:var(--warning)">${cur} ${fmtPrice(otherSellersPrice)}</strong></div>`
      : ''
    }
    <div class="card-badges">
      ${sellerBadge}${primeBadge}${stockBadgeFinal}${inactiveBadge}${targetBadge}${highlightBadge}
    </div>

    <div class="card-stats">
      <div class="stat-item">
        <div class="stat-label">Lowest ever</div>
        <div class="stat-val low">${item.lowestPrice != null ? cur + ' ' + fmtPrice(item.lowestPrice) : '—'}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Target price</div>
        <div class="stat-val">${item.target_price != null ? cur + ' ' + fmtPrice(item.target_price) : '—'}</div>
      </div>
    </div>

    <div class="card-checked">Added: ${relativeTime(item.created_at)} · Checked: ${relativeTime(item.last_checked_at)}</div>

    ${hasError ? `<div class="card-error">⚠ ${escHtml(p.error)}</div>` : ''}

    <div class="card-actions" style="flex-wrap:wrap;gap:5px">
      <button class="btn btn-ghost btn-sm" data-action="check-item" data-id="${item.id}" ${isChecking ? 'disabled' : ''} style="flex:0 0 auto">
        ${isChecking ? '<span class="spinner"></span>' : '🔄'} Check
      </button>
      <button class="btn btn-ghost btn-sm" data-action="view-history" data-id="${item.id}" style="flex:0 0 auto">📈</button>
      <button class="btn btn-ghost btn-sm" data-action="edit-item" data-id="${item.id}" style="flex:0 0 auto">✏️</button>
      <a href="${escHtml(item.url)}" target="_blank" rel="noopener" class="btn btn-ghost btn-sm" style="text-decoration:none;flex:0 0 auto">🔗</a>
      <button class="btn btn-ghost btn-sm" data-action="add-to-wishlist" data-id="${item.id}" title="Add to Wishlist" style="flex:0 0 auto">🛒+</button>
      <button class="btn btn-primary btn-sm" data-action="mark-bought" data-id="${item.id}" style="flex:1;justify-content:center;min-width:70px">Bought</button>
    </div>
  </div>`;
}

// ── Render: History Sheet ──────────────────────────────────────────────────────
async function openHistorySheet(itemId) {
  openSheet('Price History', '<div class="loading"><div class="spinner"></div> Loading…</div>');
  try {
    const { item, history } = await api('GET', `/api/items/${itemId}/history?limit=200`);
    const validHistory = history.filter(h => h.price != null && !h.error);
    renderHistorySheet(item, history, validHistory);
  } catch (e) {
    document.getElementById('sheet-body').innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  }
}

function renderHistorySheet(item, allHistory, validHistory) {
  const lowestPrice = validHistory.length ? Math.min(...validHistory.map(h => h.price)) : null;

  const historyCur = validHistory[0]?.currency || 'SAR';
  const storeLink = 'View on Amazon ↗';
  const itemIdLabel = `ASIN: ${item.asin || '—'}`;

  document.getElementById('sheet-title').textContent = item.name;
  document.getElementById('sheet-body').innerHTML = `
    <div style="margin-bottom:8px;font-size:13px;color:var(--muted)">
      ${validHistory.length} price records · ${escHtml(itemIdLabel)}
      · <a href="${escHtml(item.url)}" target="_blank" style="color:var(--accent)">${storeLink}</a>
    </div>

    <div class="chart-legend">
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--accent)"></div> Amazon SA direct</div>
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--amazon)"></div> Third-party seller</div>
      ${lowestPrice != null ? `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--success)"></div> Lowest: ${historyCur} ${fmtPrice(lowestPrice)}</div>` : ''}
      ${item.target_price != null ? `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--warning)"></div> Target: ${historyCur} ${fmtPrice(item.target_price)}</div>` : ''}
    </div>

    <div class="chart-wrap"><canvas id="price-chart"></canvas></div>

    <div style="overflow-x:auto;margin-top:16px">
      <table class="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Price (${historyCur})</th>
            <th>Was (${historyCur})</th>
            <th>Seller</th>
            <th>Stock</th>
          </tr>
        </thead>
        <tbody>
          ${[...allHistory].reverse().map(h => {
            if (h.error) {
              return `<tr class="error-row">
                <td>${new Date(h.checked_at).toLocaleString('en-SA')}</td>
                <td colspan="4">⚠ ${escHtml(h.error)}</td>
              </tr>`;
            }
            const dot = h.is_amazon_direct
              ? `<span class="seller-dot amazon"></span>`
              : `<span class="seller-dot third"></span>`;
            const sellerText = h.is_amazon_direct ? (h.seller_name || 'Amazon SA') : (h.seller_name || '—');
            return `<tr>
              <td style="white-space:nowrap">${new Date(h.checked_at).toLocaleString('en-SA')}</td>
              <td>${h.price != null ? fmtPrice(h.price) : '—'}</td>
              <td style="color:var(--muted)">${h.original_price && h.original_price !== h.price ? fmtPrice(h.original_price) : '—'}</td>
              <td>${dot}${escHtml(sellerText)}${h.is_prime ? ' ⚡' : ''}</td>
              <td>${h.in_stock ? '<span style="color:var(--success)">✓</span>' : '<span style="color:var(--danger)">✗</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  // Build chart
  if (validHistory.length === 0) return;
  const labels = validHistory.map(h => new Date(h.checked_at).toLocaleDateString('en-SA'));
  const prices = validHistory.map(h => h.price);
  const pointColors = validHistory.map(h => h.is_amazon_direct ? '#3b82f6' : '#ff9900');

  const ctx = document.getElementById('price-chart').getContext('2d');
  if (state.sheetChart) state.sheetChart.destroy();

  const datasets = [{
    label: `Price (${historyCur})`,
    data: prices,
    borderColor: '#3b82f6',
    backgroundColor: '#3b82f611',
    fill: true,
    tension: 0.3,
    pointBackgroundColor: pointColors,
    pointRadius: validHistory.length > 50 ? 2 : 4,
    pointHoverRadius: 6,
  }];

  const annotations = {};
  if (lowestPrice != null) {
    annotations.lowest = {
      type: 'line', yMin: lowestPrice, yMax: lowestPrice,
      borderColor: '#22c55e', borderWidth: 1.5, borderDash: [6, 3],
      label: { content: `Low ${historyCur} ${fmtPrice(lowestPrice)}`, display: true, backgroundColor: '#22c55e33', color: '#22c55e', font: { size: 11 } },
    };
  }
  if (item.target_price != null) {
    annotations.target = {
      type: 'line', yMin: item.target_price, yMax: item.target_price,
      borderColor: '#f59e0b', borderWidth: 1.5, borderDash: [6, 3],
      label: { content: `Target ${historyCur} ${fmtPrice(item.target_price)}`, display: true, backgroundColor: '#f59e0b33', color: '#f59e0b', font: { size: 11 } },
    };
  }

  state.sheetChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => items[0].label,
            label: (ctx) => {
              const h = validHistory[ctx.dataIndex];
              const seller = h.is_amazon_direct ? 'Amazon SA' : (h.seller_name || 'Seller');
              return [`${historyCur} ${fmtPrice(ctx.raw)}`, `Seller: ${seller}`, h.is_prime ? 'Prime ⚡' : ''];
            },
          },
          backgroundColor: '#1e293b',
          borderColor: '#334155',
          borderWidth: 1,
          titleColor: '#f1f5f9',
          bodyColor: '#94a3b8',
        },
      },
      scales: {
        x: {
          grid: { color: '#334155' },
          ticks: { color: '#94a3b8', maxTicksLimit: 8, maxRotation: 0 },
        },
        y: {
          grid: { color: '#334155' },
          ticks: {
            color: '#94a3b8',
            callback: v => historyCur + ' ' + fmtPrice(v),
          },
        },
      },
    },
  });
}

        <button class="btn btn-ghost btn-sm" data-action="check-all-now">🔄 Check All Items Now</button>
        <div id="check-all-msg" style="margin-top:8px"></div>
      </div>


      <div class="settings-section">
        <h3>Account</h3>
        <p style="font-size:13px;color:var(--muted)">Logged in as <strong style="color:var(--text)">${escHtml(state.user?.username || '')}</strong></p>
        <button class="btn btn-danger btn-sm" data-action="logout" style="margin-top:8px">Sign Out</button>
      </div>`;

    document.getElementById('sheet-footer').innerHTML = `
      <button class="btn btn-ghost" data-action="close-sheet" style="flex:1;justify-content:center">Close</button>
      <button class="btn btn-primary" data-action="save-settings" style="flex:2;justify-content:center">Save Settings</button>`;
  } catch (e) {
    document.getElementById('sheet-body').innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  }
}

// ── Render: Notifications Sheet ────────────────────────────────────────────────
async function openNotificationsSheet() {
  openSheet('Notifications Sent', '<div class="loading"><div class="spinner"></div> Loading…</div>');
  try {
    const notifs = await api('GET', '/api/notifications');
    if (notifs.length === 0) {
      document.getElementById('sheet-body').innerHTML = `
        <div class="empty" style="padding:32px 0">
          <div class="empty-icon">🔔</div>
          <p style="color:var(--muted)">No notifications sent yet.</p>
        </div>`;
      return;
    }
    document.getElementById('sheet-body').innerHTML = `
      <div class="notif-list">
        ${notifs.map(n => `
          <div class="notif-item ${escHtml(n.type)}">
            <div class="notif-meta">
              <span>${n.type === 'price_drop' ? '📉 Price Drop' : '✅ Back in Stock'}</span>
              <span>·</span>
              <span>${new Date(n.sent_at).toLocaleString('en-SA')}</span>
            </div>
            <div class="notif-name">${escHtml(n.item_name)}</div>
            ${n.price != null ? `<div class="notif-price">${escHtml(n.currency || 'SAR')} ${fmtPrice(n.price)}</div>` : ''}
          </div>`).join('')}
      </div>`;
  } catch (e) {
    document.getElementById('sheet-body').innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  }
}

// ── Render: Mark Bought Sheet ─────────────────────────────────────────────────
function openMarkBoughtSheet(item) {
  const cur = itemCurrency(item);
  const currentPrice = item.latest && item.latest.price != null ? item.latest.price : '';
  const today = new Date().toISOString().split('T')[0];
  const highestHint = item.highestPrice
    ? '<div class="hint">Peak price ever recorded: ' + cur + ' ' + fmtPrice(item.highestPrice) + '</div>'
    : '';
  openSheet('Mark as Purchased',
    '<div id="buy-msg"></div>' +
    '<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Record your purchase for <strong style="color:var(--text)">' + escHtml(item.name) + '</strong></p>' +
    '<div class="form-group">' +
      '<label>Price You Paid (' + escHtml(cur) + ')</label>' +
      '<input type="number" id="buy-price" value="' + escHtml(String(currentPrice)) + '" min="0" step="0.01" placeholder="e.g. 450.00">' +
      highestHint +
    '</div>' +
    '<div class="form-group">' +
      '<label>Purchase Date</label>' +
      '<input type="date" id="buy-date" value="' + today + '">' +
    '</div>' +
    '<div class="form-group">' +
      '<label>Notes (optional)</label>' +
      '<input type="text" id="buy-notes" placeholder="e.g. Black Friday deal, used coupon">' +
    '</div>',
    '<button class="btn btn-ghost" data-action="close-sheet" style="flex:1;justify-content:center">Cancel</button>' +
    '<button class="btn btn-primary" data-action="save-purchase" data-id="' + item.id + '" style="flex:2;justify-content:center" id="save-buy-btn">Save Purchase</button>'
  );
}

// ── Render: Purchases / Savings Sheet ─────────────────────────────────────────
async function openPurchasesSheet() {
  openSheet('My Savings', '<div class="loading"><div class="spinner"></div> Loading…</div>');
  try {
    const purchases = await api('GET', '/api/purchases');
    if (purchases.length === 0) {
      document.getElementById('sheet-body').innerHTML =
        '<div class="empty" style="padding:32px 0">' +
        '<div class="empty-icon">🛒</div>' +
        '<p style="color:var(--muted)">No purchases recorded yet.</p>' +
        '<p style="color:var(--muted);margin-top:8px;font-size:13px">Hit the <strong style="color:var(--text)">Bought</strong> button on any item card to start tracking your savings.</p>' +
        '</div>';
      return;
    }

    const totalSpent = purchases.reduce(function(s, p) { return s + p.purchased_price; }, 0);
    const totalSaved = purchases.reduce(function(s, p) {
      return s + (p.highest_price ? Math.max(0, p.highest_price - p.purchased_price) : 0);
    }, 0);

    const summaryHtml =
      '<div class="purchases-summary">' +
        '<div class="purchase-stat"><div class="purchase-stat-val">' + purchases.length + '</div><div class="purchase-stat-label">Purchases</div></div>' +
        '<div class="purchase-stat"><div class="purchase-stat-val" style="font-size:16px">SAR ' + fmtPrice(totalSpent) + '</div><div class="purchase-stat-label">Total Spent</div></div>' +
        '<div class="purchase-stat"><div class="purchase-stat-val" style="color:var(--success);font-size:16px">SAR ' + fmtPrice(totalSaved) + '</div><div class="purchase-stat-label">Total Saved</div></div>' +
      '</div>';

    const listHtml = purchases.map(function(p) {
      const savings = p.highest_price ? Math.max(0, p.highest_price - p.purchased_price) : 0;
      const savingsPct = (p.highest_price && p.highest_price > 0) ? (savings / p.highest_price * 100) : 0;
      const cur = p.currency || 'SAR';
      const imgHtml = p.item_image_url
        ? '<img class="purchase-img" src="' + escHtml(p.item_image_url) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="purchase-img-ph">📦</div>';
      const savingsHtml = savings > 0
        ? '<div style="font-size:17px;font-weight:700;color:var(--success)">' + cur + ' ' + fmtPrice(savings) +
          ' <span style="font-size:11px;background:var(--success)22;padding:2px 7px;border-radius:20px">' + savingsPct.toFixed(1) + '%</span></div>'
        : '<div style="font-size:13px;color:var(--muted)">—</div>';
      return '<div class="purchase-item">' +
        '<div class="purchase-item-top">' +
          imgHtml +
          '<div class="purchase-item-meta">' +
            '<div class="purchase-item-name">' + escHtml(p.item_name) + '</div>' +
            '<div class="purchase-item-date">Purchased ' + fmtDate(p.purchased_at) + '</div>' +
            (p.notes ? '<div class="purchase-item-notes">' + escHtml(p.notes) + '</div>' : '') +
          '</div>' +
          '<button class="btn-icon" data-action="delete-purchase" data-id="' + p.id + '" title="Remove" style="font-size:16px;color:var(--muted);flex-shrink:0">🗑</button>' +
        '</div>' +
        '<div style="display:flex;gap:16px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)">' +
          '<div style="min-width:80px"><span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">Paid</span><div style="font-size:17px;font-weight:700">' + cur + ' ' + fmtPrice(p.purchased_price) + '</div></div>' +
          '<div style="min-width:80px"><span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">Peak Price</span>' +
            (p.highest_price ? '<div style="font-size:14px;color:var(--muted);text-decoration:line-through">' + cur + ' ' + fmtPrice(p.highest_price) + '</div>' : '<div style="font-size:13px;color:var(--muted)">—</div>') +
          '</div>' +
          '<div style="min-width:80px"><span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">Saved</span>' + savingsHtml + '</div>' +
        '</div>' +
        '</div>';
    }).join('');

    document.getElementById('sheet-body').innerHTML = summaryHtml + '<div class="purchases-list">' + listHtml + '</div>';
  } catch (e) {
    document.getElementById('sheet-body').innerHTML = '<div class="alert alert-error">' + escHtml(e.message) + '</div>';
  }
}

// ── Actions ────────────────────────────────────────────────────────────────────
async function loadItems() {
  state.items = await api('GET', '/api/items');
  // Refresh wishlist count in background (non-blocking)
  api('GET', '/api/wishlist').then(function(r) { state.wishlistItems = r; renderDashboard(); }).catch(function() {});
  renderDashboard();
}

function setMsg(id, html, type = 'error') {
  const el = document.getElementById(id);
  if (el) el.innerHTML = `<div class="alert alert-${type}">${html}</div>`;
}

document.addEventListener('click', async e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id ? parseInt(el.dataset.id) : null;

  if (action === 'close-sheet') { closeSheet(); return; }
  if (action === 'switch-auth') { renderAuth(el.dataset.mode); return; }

  // (auth handled via form submit event)

  if (action === 'logout') {
    await api('POST', '/api/auth/logout').catch(() => {});
    state.user = null;
    state.items = [];
    closeSheet();
    renderAuth('login');
    return;
  }

  // ── Add Item ──
  if (action === 'open-add-item') { openAddItemSheet(); return; }

  if (action === 'save-add-item') {
    const input = document.getElementById('item-input')?.value.trim();
    const name = document.getElementById('item-name')?.value.trim();
    const target = document.getElementById('item-target')?.value;
    const dropPct = document.getElementById('item-drop-pct')?.value;
    const btn = document.getElementById('save-add-btn');
    if (!input) { setMsg('add-msg', 'Please enter a URL or ASIN.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Fetching product…';
    setMsg('add-msg', 'Scraping product page for current price and product info…', 'info');
    try {
      await api('POST', '/api/items', { input, name: name || undefined, target_price: target || undefined, notify_drop_percent: dropPct });
      closeSheet();
      await loadItems();
    } catch (err) {
      setMsg('add-msg', escHtml(err.message));
      btn.disabled = false;
      btn.innerHTML = 'Add &amp; Track';
    }
    return;
  }

  // ── Edit Item ──
  if (action === 'edit-item') {
    const item = state.items.find(i => i.id === id);
    if (item) openEditItemSheet(item);
    return;
  }

  if (action === 'save-edit-item') {
    const btn = el;
    const name = document.getElementById('edit-name')?.value.trim();
    const target = document.getElementById('edit-target')?.value;
    const dropPct = document.getElementById('edit-drop-pct')?.value;
    const active = document.getElementById('edit-active')?.checked;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await api('PUT', `/api/items/${id}`, { name, target_price: target || null, notify_drop_percent: dropPct, active });
      closeSheet();
      await loadItems();
    } catch (err) {
      setMsg('edit-msg', escHtml(err.message));
      btn.disabled = false;
      btn.innerHTML = 'Save Changes';
    }
    return;
  }

  // ── Delete Item ──
  if (action === 'delete-item') {
    if (!confirm(`Delete this item and all its price history? This cannot be undone.`)) return;
    try {
      await api('DELETE', `/api/items/${id}`);
      state.items = state.items.filter(i => i.id !== id);
      closeSheet();
      renderDashboard();
      loadItems().catch(() => {});
    } catch (err) {
      setMsg('edit-msg', escHtml(err.message));
    }
    return;
  }

  // ── View / Sort / Group ──
  if (action === 'switch-view') {
    state.view = el.dataset.view;
    if (state.view === 'purchased') {
      state.purchasedItems = null;
      renderDashboard();
      await loadPurchasedItems();
    } else if (state.view === 'wishlist') {
      state.wishlistItems = null;
      renderDashboard();
      await loadWishlistItems();
    } else {
      renderDashboard();
    }
    return;
  }
  if (action === 'sort') { state.sort = el.dataset.sort; renderDashboard(); return; }
  if (action === 'group') { state.groupBy = el.dataset.group; renderDashboard(); return; }

  // ── Check Item ──
  if (action === 'check-item') {
    state.checking.add(id);
    renderDashboard();
    try {
      await api('POST', `/api/items/${id}/check`);
      state.checking.delete(id);  // clear before loadItems re-renders
      await loadItems();
    } catch (err) {
      state.checking.delete(id);
      renderDashboard();
      alert(`Check failed: ${err.message}`);
    }
    return;
  }

  // ── View History ──
  if (action === 'view-history') { await openHistorySheet(id); return; }

  // ── Settings ──
  if (action === 'open-settings') { await openSettingsSheet(); return; }

  if (action === 'save-settings') {
    const botToken = document.getElementById('s-bot-token')?.value.trim();
    const chatId = document.getElementById('s-chat-id')?.value.trim();
    const interval = document.getElementById('s-interval')?.value;
    const notifyDrop = document.getElementById('s-notify-drop')?.checked ? '1' : '0';
    const notifyStock = document.getElementById('s-notify-stock')?.checked ? '1' : '0';
    const payload = { check_interval: interval, notify_price_drop: notifyDrop, notify_back_in_stock: notifyStock };
    if (chatId) payload.telegram_chat_id = chatId;
    if (botToken) payload.telegram_bot_token = botToken;
    const btn = el;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await api('PUT', '/api/settings', payload);
      setMsg('settings-msg', 'Settings saved.', 'success');
    } catch (err) {
      setMsg('settings-msg', escHtml(err.message));
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Save Settings';
    }
    return;
  }

  if (action === 'test-telegram') {
    const btn = el;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sending…';
    try {
      await api('POST', '/api/settings/test-telegram');
      document.getElementById('test-msg').innerHTML = `<div class="alert alert-success">✅ Sent! Check your Telegram.</div>`;
    } catch (err) {
      document.getElementById('test-msg').innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '📨 Send Test Message';
    }
    return;
  }

  if (action === 'check-all-now') {
    const btn = el;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Starting…';
    try {
      await api('POST', '/api/settings/check-all');
      document.getElementById('check-all-msg').innerHTML = `<div class="alert alert-info">Price check started in the background. Cards will update when complete.</div>`;
      setTimeout(() => loadItems(), 10000);
    } catch (err) {
      document.getElementById('check-all-msg').innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '🔄 Check All Items Now';
    }
    return;
  }

  // ── Purchases / Savings ──
  if (action === 'mark-bought') {
    const item = state.items.find(i => i.id === id);
    if (item) openMarkBoughtSheet(item);
    return;
  }

  if (action === 'save-purchase') {
    const price = document.getElementById('buy-price')?.value;
    const date = document.getElementById('buy-date')?.value;
    const notes = document.getElementById('buy-notes')?.value.trim();
    const btn = document.getElementById('save-buy-btn');
    if (!price || isNaN(parseFloat(price))) { setMsg('buy-msg', 'Please enter a valid price.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await api('POST', `/api/items/${id}/purchases`, { purchased_price: parseFloat(price), purchased_at: date || undefined, notes: notes || undefined });
      closeSheet();
      await loadItems();
      state.purchasedItems = null;
      state.view = 'purchased';
      renderDashboard();
      await loadPurchasedItems();
    } catch (err) {
      setMsg('buy-msg', escHtml(err.message));
      btn.disabled = false;
      btn.innerHTML = 'Save Purchase';
    }
    return;
  }

  if (action === 'delete-purchase') {
    if (!confirm('Remove this purchase record?')) return;
    try {
      await api('DELETE', `/api/purchases/${id}`);
      await openPurchasesSheet();
    } catch (err) {
      alert('Failed: ' + err.message);
    }
    return;
  }

  if (action === 'restore-item') {
    if (!confirm('Move this item back to your tracking list?')) return;
    try {
      await api('PUT', `/api/purchased-items/${id}/restore`);
      await Promise.all([loadItems(), loadPurchasedItems()]);
    } catch (err) {
      alert('Failed: ' + err.message);
    }
    return;
  }

  if (action === 'delete-purchased-item') {
    if (!confirm('Delete this item and all its price history? This cannot be undone.')) return;
    try {
      await api('DELETE', `/api/items/${id}`);
      state.purchasedItems = (state.purchasedItems || []).filter(function(i) { return i.id !== id; });
      renderDashboard();
    } catch (err) {
      alert('Failed: ' + err.message);
    }
    return;
  }

  // ── Notifications ──
  if (action === 'open-notifications') { await openNotificationsSheet(); return; }

  // ── Wishlist ──
  if (action === 'open-add-wishlist') { openAddWishlistSheet(); return; }

  if (action === 'add-to-wishlist') {
    const item = state.items.find(function(i) { return i.id === id; });
    if (!item) return;
    try {
      await api('POST', '/api/wishlist', { item_id: id, quantity: 1 });
      state.wishlistItems = null;
      // Reload wishlist in background to update tab counter
      api('GET', '/api/wishlist').then(function(r) { state.wishlistItems = r; renderDashboard(); }).catch(function() {});
      // Brief feedback via alert
      const btn = e.target.closest('[data-action]');
      if (btn) { btn.textContent = '✓'; setTimeout(function() { btn.textContent = '🛒+'; }, 1200); }
    } catch (err) {
      alert('Could not add to wishlist: ' + err.message);
    }
    return;
  }

  if (action === 'save-add-wishlist') {
    const input = document.getElementById('wl-input')?.value.trim();
    const name = document.getElementById('wl-name')?.value.trim();
    const qty = document.getElementById('wl-qty')?.value;
    const btn = document.getElementById('save-wl-btn');
    if (!input) { setMsg('wl-msg', 'Please enter a URL or ASIN.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Fetching product&#x2026;';
    setMsg('wl-msg', 'Fetching product info&#x2026;', 'info');
    try {
      await api('POST', '/api/wishlist', { input, name: name || undefined, quantity: parseInt(qty) || 1 });
      closeSheet();
      await Promise.all([loadItems(), loadWishlistItems()]);
    } catch (err) {
      setMsg('wl-msg', escHtml(err.message));
      btn.disabled = false;
      btn.innerHTML = 'Add to Wishlist';
    }
    return;
  }

  if (action === 'wishlist-qty-inc' || action === 'wishlist-qty-dec') {
    const wid = parseInt(el.dataset.wid);
    const currentQty = parseInt(el.dataset.qty) || 1;
    const newQty = action === 'wishlist-qty-inc' ? currentQty + 1 : Math.max(1, currentQty - 1);
    try {
      await api('PUT', '/api/wishlist/' + wid, { quantity: newQty });
      await loadWishlistItems();
    } catch (err) {
      alert('Failed: ' + err.message);
    }
    return;
  }

  if (action === 'wishlist-remove') {
    const wid = parseInt(el.dataset.wid);
    if (!confirm('Remove this item from your wishlist?')) return;
    try {
      await api('DELETE', '/api/wishlist/' + wid);
      await loadWishlistItems();
    } catch (err) {
      alert('Failed: ' + err.message);
    }
    return;
  }
});

// Auth form submit (Enter key or button click)
document.addEventListener('submit', async e => {
  if (e.target.id !== 'auth-form') return;
  e.preventDefault();
  const btn = document.getElementById('auth-btn');
  const isLogin = btn?.textContent.trim().includes('Sign In');
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
    const data = await api('POST', endpoint, { username, password });
    state.user = { username: data.username };
    await loadItems();
  } catch (err) {
    setMsg('auth-msg', escHtml(err.message));
    btn.disabled = false;
    btn.innerHTML = isLogin ? 'Sign In' : 'Create Account';
  }
});

// Close sheet on overlay click
document.getElementById('overlay').addEventListener('click', closeSheet);

// ── Init ───────────────────────────────────────────────────────────────────────
(async function init() {
  try {
    const status = await api('GET', '/api/auth/status');
    if (status.loggedIn) {
      state.user = { username: status.username };
      await loadItems();
    } else {
      renderAuth('login');
    }
  } catch (_) {
    renderAuth('login');
  }
})();

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
