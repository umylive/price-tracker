services:
  price-tracker:
    container_name: price-tracker
    build: .
    restart: unless-stopped
    ports:
      - "8766:3000"
    volumes:
      - /mnt/user/appdata/price-tracker:/data
    environment:
      - TZ=Asia/Riyadh
      - PORT=3000
      - DATA_DIR=/data
      - TELEGRAM_BOT_TOKEN=
      - TELEGRAM_CHAT_ID=
