name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'price-tracker-build/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./price-tracker-build/price-tracker-app
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/price-tracker:latest
            ghcr.io/${{ github.repository_owner }}/price-tracker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/price-tracker:${{ github.run_id }}
